watchlist: regulatory
topics:
  - id: pfas-restriction-updates
    query: "PFAS restriction proposal update"
    domains: [echa.europa.eu]
    why_it_matters: "Changes to EU PFAS restriction proposals affect materials, chemicals, and product compliance obligations"

  - id: ofac-sanctions-designations
    query: "new sanctions designation specially designated nationals list update"
    domains: [ofac.treasury.gov]
    why_it_matters: "New OFAC designations can immediately affect screening obligations and permissible counterparties"

  - id: fda-device-recalls
    query: "medical device recall notice"
    domains: [fda.gov]
    why_it_matters: "FDA device recalls can affect supply chains and require prompt compliance action for affected products"
